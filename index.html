<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Гармония — тест</title>
    <style>
        body { font-family: Georgia, serif; background: #c7ab6e; color: #1e422a; text-align: center; padding: 40px; }
        .header { background: #1e422a; padding: 20px; border-radius: 30px; color: #c7ab6e; }
        button { background: #1e422a; color: #c7ab6e; border: none; padding: 10px 20px; margin: 10px; border-radius: 30px; cursor: pointer; }
        input { padding: 8px; margin: 5px; border-radius: 20px; border: none; }
        .card { background: #fef5e0; padding: 20px; margin: 20px auto; max-width: 400px; border-radius: 30px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">
    <h1>ГАРМОНИЯ</h1>
    <p>БРОВИ & РЕСНИЦЫ</p>
    <div>
        <button id="homeBtn">Главная</button>
        <button id="loginBtn">Вход</button>
        <button id="regBtn">Регистрация</button>
        <button id="logoutBtn" style="display:none">Выход</button>
    </div>
</div>

<div class="card" id="app">
    <h2>Добро пожаловать!</h2>
    <p>Студия аппаратного восстановления бровей</p>
</div>

<script>
    // === НАСТРОЙКИ SUPABASE ===
    const SUPABASE_URL = 'https://idbijgtjinbtrdjjyxwj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_nJWpFtSfDsq45ccKdzv7Uw_FxwNGy2Q';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentUser = null;
    
    async function loadUser() {
        const { data } = await sb.auth.getUser();
        currentUser = data?.user || null;
        document.getElementById('loginBtn').style.display = currentUser ? 'none' : 'inline-block';
        document.getElementById('regBtn').style.display = currentUser ? 'none' : 'inline-block';
        document.getElementById('logoutBtn').style.display = currentUser ? 'inline-block' : 'none';
        
        const app = document.getElementById('app');
        if (currentUser) {
            app.innerHTML = `<h2>Привет, ${currentUser.email}!</h2><p>Вы успешно вошли.</p>`;
        } else {
            app.innerHTML = `<h2>Добро пожаловать!</h2><p>Войдите или зарегистрируйтесь.</p>`;
        }
    }
    
    async function logout() {
        await sb.auth.signOut();
        await loadUser();
    }
    
    function showLogin() {
        document.getElementById('app').innerHTML = `
            <h2>Вход</h2>
            <input type="email" id="email" placeholder="Email"><br>
            <input type="password" id="password" placeholder="Пароль"><br>
            <button id="doLogin">Войти</button>
        `;
        document.getElementById('doLogin').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else await loadUser();
        };
    }
    
    function showRegister() {
        document.getElementById('app').innerHTML = `
            <h2>Регистрация</h2>
            <input type="text" id="name" placeholder="Имя"><br>
            <input type="tel" id="phone" placeholder="Телефон"><br>
            <input type="email" id="email" placeholder="Email"><br>
            <input type="password" id="password" placeholder="Пароль"><br>
            <button id="doReg">Зарегистрироваться</button>
        `;
        document.getElementById('doReg').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const { error } = await sb.auth.signUp({ email, password });
            if (error) alert(error.message);
            else {
                await sb.from('users').insert([{ email, name, phone, role: 'client' }]);
                alert('Регистрация успешна! Проверьте почту и войдите.');
                await loadUser();
            }
        };
    }
    
    document.getElementById('homeBtn').onclick = () => loadUser();
    document.getElementById('loginBtn').onclick = () => showLogin();
    document.getElementById('regBtn').onclick = () => showRegister();
    document.getElementById('logoutBtn').onclick = () => logout();
    
    loadUser();
</script>

</body>
</html>
